name: Release – Publish Docker Images

on:
  release:
    types: [published]

# Minimal permissions at workflow level; jobs opt-in to what they need
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Mark the release as pre-release by default
  # ─────────────────────────────────────────────
  mark-prerelease:
    name: Mark as Pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to update the release
    steps:
      - name: Set release as pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            repos/${{ github.repository }}/releases/${{ github.event.release.id }} \
            -f prerelease=true

  # ─────────────────────────────────────────────
  # Frontend – Next.js (multi-platform via buildx)
  # ─────────────────────────────────────────────
  publish-frontend:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    needs: mark-prerelease
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strip the leading "v" from the release tag (v1.2.3 → 1.2.3)
      - name: Derive image tag
        id: meta
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RAW_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          REPO_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LC}/flowinquiry-frontend" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          # Layer caching backed by the registry itself
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:cache,mode=max


  # ─────────────────────────────────────────────
  # Backend – Spring Boot (Jib, multi-platform)
  # ─────────────────────────────────────────────
  publish-backend:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs: mark-prerelease
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Strip the leading "v" from the release tag (v1.2.3 → 1.2.3)
      - name: Derive image tag
        id: meta
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RAW_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          REPO_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LC}/flowinquiry-server" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image via Jib
        run: |
          ./gradlew :apps:backend:server:jib \
            -Djib.to.image="${{ steps.meta.outputs.image }}" \
            -Djib.to.tags="${{ steps.meta.outputs.version }},latest" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}" \
            -Djib.from.platforms="linux/amd64,linux/arm64" \
            -Djib.container.labels="org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            -Pversion="${{ steps.meta.outputs.version }}"

  # ─────────────────────────────────────────────
  # Make both packages public via classic PAT
  # Requires secret: PAT_TOKEN  (classic PAT owned
  # by an org admin with scopes: write:packages,
  # delete:packages, read:org)
  # ─────────────────────────────────────────────
  make-packages-public:
    name: Make Packages Public
    runs-on: ubuntu-latest
    needs: [publish-frontend, publish-backend]
    steps:
      - name: Set packages visibility to public
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: |
          ORG_LC=$(echo "$ORG" | tr '[:upper:]' '[:lower:]')
          for PACKAGE in flowinquiry-frontend flowinquiry-server; do
            echo "Setting $PACKAGE to public..."
            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/orgs/${ORG_LC}/packages/container/${PACKAGE}" \
              -d '{"visibility":"public"}')
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ $PACKAGE is now public"
            else
              echo "⚠️  $PACKAGE visibility update returned HTTP $HTTP_STATUS:"
              cat /tmp/response.json
            fi
          done
