name: Release – Publish Docker Images

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Mark the release as pre-release by default
  # ─────────────────────────────────────────────
  mark-prerelease:
    name: Mark as Pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set release as pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            repos/${{ github.repository }}/releases/${{ github.event.release.id }} \
            -f prerelease=true

  # ─────────────────────────────────────────────
  # Frontend – Next.js (multi-platform via buildx)
  # ─────────────────────────────────────────────
  publish-frontend:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    needs: mark-prerelease
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RAW_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dh_image=flowinquiry/flowinquiry-frontend" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.dh_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.dh_image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  # ─────────────────────────────────────────────
  # Backend – Spring Boot (Jib, multi-platform)
  # ─────────────────────────────────────────────
  publish-backend:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs: mark-prerelease
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive image tag
        id: meta
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RAW_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dh_image=flowinquiry/flowinquiry-server" >> "$GITHUB_OUTPUT"


      - name: Push to Docker Hub via Jib
        run: |
          ./gradlew :apps:backend:server:jib --build-cache \
            -Djib.to.image="${{ steps.meta.outputs.dh_image }}:${{ steps.meta.outputs.version }}" \
            -Djib.to.tags="latest" \
            -Djib.to.auth.username="${{ secrets.DOCKERHUB_USERNAME }}" \
            -Djib.to.auth.password="${{ secrets.DOCKERHUB_TOKEN }}" \
            -Djib.from.platforms="linux/amd64,linux/arm64" \
            -Djib.container.labels="org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            -Pversion="${{ steps.meta.outputs.version }}"
